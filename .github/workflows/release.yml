name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "要上传/发布到的 tag（例如 v1.2.7）。留空则使用当前 ref。"
        required: false
        default: ""
      ref:
        description: "要构建的 commit SHA 或分支（留空则用 tag 指向的 commit）"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

env:
  RELEASE_TAG: ${{ (github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag) || github.ref_name }}
  CHECKOUT_REF: ${{ (github.event_name == 'workflow_dispatch' && inputs.ref != '' && inputs.ref) || (github.event_name == 'workflow_dispatch' && inputs.tag != '' && inputs.tag) || github.ref_name }}

jobs:
  # ── Job 1: 创建 / 更新 Draft Release ──
  create_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.gh_release.outputs.id }}
      is_stable: ${{ steps.detect_channel.outputs.is_stable }}
      channel: ${{ steps.detect_channel.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
          fetch-depth: 0

      # ── 判断发布渠道：tag 来自 v*.x 稳定分支 → stable，否则 → dev ──
      - name: Detect release channel
        id: detect_channel
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          # 从 tag 名提取 major.minor → 构造对应的稳定分支名 v{major}.{minor}.x
          MAJOR_MINOR=$(echo "$TAG" | sed -E 's/^v([0-9]+\.[0-9]+)\..*/\1/')
          STABLE_BRANCH="v${MAJOR_MINOR}.x"
          echo "Tag: $TAG"
          echo "Expected stable branch: $STABLE_BRANCH"

          # 检查该稳定分支是否存在（远程）
          if git ls-remote --exit-code --heads origin "$STABLE_BRANCH" > /dev/null 2>&1; then
            # 必须先 fetch 稳定分支，否则本地没有 origin/$STABLE_BRANCH 引用
            git fetch origin "$STABLE_BRANCH"
            # 检查 tag 的 commit 是否在该稳定分支上
            TAG_SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || echo "")
            if [ -n "$TAG_SHA" ] && git merge-base --is-ancestor "$TAG_SHA" "origin/$STABLE_BRANCH" 2>/dev/null; then
              echo "is_stable=true" >> "$GITHUB_OUTPUT"
              echo "channel=stable" >> "$GITHUB_OUTPUT"
              echo "✅ Stable release (tag on $STABLE_BRANCH branch)"
            else
              echo "is_stable=false" >> "$GITHUB_OUTPUT"
              echo "channel=dev" >> "$GITHUB_OUTPUT"
              echo "⚠️ Dev release (tag not on $STABLE_BRANCH, likely from main)"
            fi
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "⚠️ Dev release (no $STABLE_BRANCH branch exists)"
          fi

      - name: Create or update draft release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          prerelease: ${{ steps.detect_channel.outputs.is_stable != 'true' }}

  # ── Job 2a: Python 包发布 ──
  python_release:
    needs: create_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Check version consistency (must match tag)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') }}
        run: python scripts/version.py check --expected "${GITHUB_REF_NAME#v}"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: python -m build
      
      - name: Upload Python artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          draft: true
          overwrite_files: true
      
      - name: Publish to PyPI (Trusted Publishing / OIDC)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && env.PYPI_API_TOKEN == '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Publish to PyPI (API token)
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && env.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install twine
          twine upload dist/* --skip-existing

  # ── Job 2b: Desktop 安装包构建（多平台矩阵） ──
  desktop_release:
    needs: create_release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-latest
            bundles: "nsis"
            args: ""
            build_mode: "core"
            suffix: "-core"
          # Linux Ubuntu 22.04
          - platform: ubuntu-22.04
            bundles: "deb"
            args: ""
            build_mode: "core"
            suffix: "-ubuntu22-amd64"
          - platform: ubuntu-22.04-arm
            bundles: "deb"
            args: ""
            build_mode: "core"
            suffix: "-ubuntu22-arm64"
          # Linux Ubuntu 24.04
          - platform: ubuntu-24.04
            bundles: "deb"
            args: ""
            build_mode: "core"
            suffix: "-ubuntu24-amd64"
          - platform: ubuntu-24.04-arm
            bundles: "deb"
            args: ""
            build_mode: "core"
            suffix: "-ubuntu24-arm64"
          # macOS - Apple Silicon (arm64)
          - platform: macos-latest
            bundles: "app,dmg"
            args: "--target aarch64-apple-darwin"
            rust_target: "aarch64-apple-darwin"
            build_mode: "core"
            suffix: "-macos-arm64"
          # macOS - Intel (x86_64)
          - platform: macos-15-intel
            bundles: "app,dmg"
            args: "--target x86_64-apple-darwin"
            rust_target: "x86_64-apple-darwin"
            build_mode: "core"
            suffix: "-macos-x64"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Install Linux system dependencies (Ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch || '' }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/setup-center/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust cross-compilation target
        if: matrix.rust_target
        run: rustup target add ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/setup-center/src-tauri -> target

      - name: Install Python project and PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.build_mode }}" = "full" ]; then
            pip install -e ".[all]"
          else
            # Core + all IM channels + desktop automation
            # These are listed in hidden_imports/datas and must be installed for PyInstaller to bundle them
            pip install -e ".[feishu,dingtalk,wework,onebot,qqbot,windows]"
          fi
          pip install "pyinstaller>=6.18.0"

      - name: Clean previous PyInstaller output
        shell: bash
        run: |
          rm -rf dist/
          rm -rf build/openakita-server
          rm -rf build/pyinstaller_work
          rm -rf build/modules
          # macOS: clear stale PyInstaller temp dirs to avoid PYI-6038 symlink conflicts
          if [ "$(uname)" = "Darwin" ]; then
            find "${TMPDIR:-/tmp}" -maxdepth 1 -name "_MEI*" -type d -exec rm -rf {} + 2>/dev/null || true
          fi

      - name: Package Python backend (PyInstaller)
        run: python build/build_backend.py --mode ${{ matrix.build_mode }}

      - name: Bundle optional modules (full mode only)
        if: matrix.build_mode == 'full'
        run: python build/bundle_modules.py

      - name: Copy backend to Tauri resources
        shell: bash
        run: |
          RESOURCE_DIR="apps/setup-center/src-tauri/resources"
          mkdir -p "$RESOURCE_DIR"
          # 清除旧的构建产物，防止 cp 冲突
          rm -rf "$RESOURCE_DIR/openakita-server"
          cp -r dist/openakita-server "$RESOURCE_DIR/openakita-server"
          if [ "${{ matrix.build_mode }}" = "full" ] && [ -d "build/modules" ]; then
            rm -rf "$RESOURCE_DIR/modules"
            cp -r build/modules "$RESOURCE_DIR/modules"
          fi
          echo "Resources copied:"
          du -sh "$RESOURCE_DIR"/*

      - name: Verify bundled Python contract
        run: python build/verify_bundled_python_contract.py --backend-dir apps/setup-center/src-tauri/resources/openakita-server

      - name: Codesign embedded binaries for macOS notarization
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE configured, skipping codesign."
            exit 0
          fi
          RESOURCE_DIR="apps/setup-center/src-tauri/resources"
          IDENTITY="${APPLE_SIGNING_IDENTITY}"

          echo "Importing certificate to keychain..."
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "Signing embedded binaries with identity: ${IDENTITY}"
          find "$RESOURCE_DIR" -type f -perm +111 | while read -r bin; do
            # Sign Python.framework as a bundle explicitly (below), not per-file.
            if [[ "$bin" == *"/Python.framework/"* ]]; then
              echo "  Skipping Python.framework inner binary at resource stage: $bin"
              continue
            fi
            echo "  Signing: $bin"
            codesign --force --options runtime --timestamp --sign "$IDENTITY" "$bin"
          done
          echo "All embedded binaries signed."

      - name: Create gitignored placeholders for Rust build
        shell: bash
        run: |
          # user_custom.md is gitignored (personal data); create placeholder for include_str!()
          mkdir -p identity/personas
          if [ ! -f identity/personas/user_custom.md ]; then
            echo "# User Custom Persona (placeholder)" > identity/personas/user_custom.md
          fi

      - name: Install frontend dependencies
        working-directory: apps/setup-center
        run: npm ci

      - name: Preflight Rust dependency check
        working-directory: apps/setup-center/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          cargo fetch --locked
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo check --target "${{ matrix.rust_target }}"
          else
            cargo check
          fi

      - name: Clean Rust release intermediates for current target
        shell: bash
        run: |
          set -euo pipefail
          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            RELEASE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release"
          else
            RELEASE_DIR="${TARGET_BASE}/release"
          fi
          rm -rf "${RELEASE_DIR}/deps" "${RELEASE_DIR}/build" "${RELEASE_DIR}/.fingerprint"
          mkdir -p "${RELEASE_DIR}"

      - name: Build Tauri bundles
        working-directory: apps/setup-center
        timeout-minutes: 150
        env:
          TAURI_CONFIG: ${{ matrix.build_mode == 'full' && '{"bundle":{"resources":["resources/openakita-server/","resources/modules/"]}}' || '{}' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: 1
        shell: bash
        run: |
          set +e
          MAX_ATTEMPTS=2
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "=== Build attempt $ATTEMPT/$MAX_ATTEMPTS ==="
            npx tauri build --bundles "${{ matrix.bundles }}" ${{ matrix.args }}
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Build succeeded on attempt $ATTEMPT"
              exit 0
            fi
            echo "Build failed (exit $EXIT_CODE) on attempt $ATTEMPT"
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -le $MAX_ATTEMPTS ]; then
              echo "Waiting 30s before retry..."
              sleep 30
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed"
          exit 1

      - name: Re-sign final macOS app bundles for notarization
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "APPLE_CERTIFICATE / APPLE_SIGNING_IDENTITY not configured, skipping final app re-sign."
            exit 0
          fi

          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            BUNDLE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release/bundle"
          else
            BUNDLE_DIR="${TARGET_BASE}/release/bundle"
          fi

          # Only sign top-level .app bundles (under macos/), NOT nested Python.app etc.
          # The previous `find` without -maxdepth picked up nested Python.app bundles
          # and re-signed them AFTER the main app was sealed, breaking the seal.
          MACOS_BUNDLE_DIR="${BUNDLE_DIR}/macos"
          APPS=()
          if [ -d "${MACOS_BUNDLE_DIR}" ]; then
            while IFS= read -r -d '' app; do
              APPS+=("${app}")
            done < <(find "${MACOS_BUNDLE_DIR}" -maxdepth 1 -type d -name "*.app" -print0)
          fi
          if [ "${#APPS[@]}" -eq 0 ]; then
            echo "No .app bundles found under ${MACOS_BUNDLE_DIR}; skip."
            exit 0
          fi

          IDENTITY="${APPLE_SIGNING_IDENTITY}"
          for app in "${APPS[@]}"; do
            FRAMEWORK_DIR="${app}/Contents/Resources/resources/openakita-server/_internal/Python.framework"
            if [ -d "${FRAMEWORK_DIR}" ]; then
              # PyInstaller copies files instead of creating symlinks, but macOS
              # framework conventions require top-level Python.framework/Python and
              # Python.framework/Resources to be symlinks into Versions/Current/.
              # Without this, codesign treats the framework root binary as a bundle
              # entry point and fails with "bundle format is ambiguous".
              FW_TOP_PYTHON="${FRAMEWORK_DIR}/Python"
              if [ -f "${FW_TOP_PYTHON}" ] && [ ! -L "${FW_TOP_PYTHON}" ]; then
                rm -f "${FW_TOP_PYTHON}"
                ln -s "Versions/Current/Python" "${FW_TOP_PYTHON}"
                echo "Fixed Python.framework/Python → symlink to Versions/Current/Python"
              fi
              FW_TOP_RESOURCES="${FRAMEWORK_DIR}/Resources"
              if [ -d "${FW_TOP_RESOURCES}" ] && [ ! -L "${FW_TOP_RESOURCES}" ]; then
                rm -rf "${FW_TOP_RESOURCES}"
                ln -s "Versions/Current/Resources" "${FW_TOP_RESOURCES}"
                echo "Fixed Python.framework/Resources → symlink to Versions/Current/Resources"
              fi

              SIGNED_REALPATHS_FILE="$(mktemp)"

              # Apple code-signing requires strict inside-out order:
              #   innermost executables → containing bundles → framework version binaries
              # Each layer's signature seals its contents, so inner layers must
              # be fully signed before outer layers that reference them.

              # 1) Sign executables inside Python.app bundles (deepest level).
              for pybin in \
                "${FRAMEWORK_DIR}/Resources/Python.app/Contents/MacOS/Python" \
                "${FRAMEWORK_DIR}/Versions/3.11/Resources/Python.app/Contents/MacOS/Python" \
                "${FRAMEWORK_DIR}/Versions/Current/Resources/Python.app/Contents/MacOS/Python"; do
                if [ -f "${pybin}" ]; then
                  REAL_PYBIN="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "${pybin}")"
                  if grep -Fqx -- "${REAL_PYBIN}" "${SIGNED_REALPATHS_FILE}"; then
                    continue
                  fi
                  echo "Signing Python.app executable: ${pybin}"
                  codesign --force --options runtime --timestamp --sign "${IDENTITY}" "${REAL_PYBIN}"
                  printf '%s\n' "${REAL_PYBIN}" >> "${SIGNED_REALPATHS_FILE}"
                fi
              done

              # 2) Sign Python.app bundles (seals the executables from step 1).
              for pyapp in \
                "${FRAMEWORK_DIR}/Resources/Python.app" \
                "${FRAMEWORK_DIR}/Versions/3.11/Resources/Python.app" \
                "${FRAMEWORK_DIR}/Versions/Current/Resources/Python.app"; do
                if [ -d "${pyapp}" ]; then
                  REAL_PYAPP="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "${pyapp}")"
                  if grep -Fqx -- "${REAL_PYAPP}" "${SIGNED_REALPATHS_FILE}"; then
                    continue
                  fi
                  echo "Signing Python.app bundle: ${pyapp}"
                  codesign --force --options runtime --timestamp --sign "${IDENTITY}" "${REAL_PYAPP}"
                  printf '%s\n' "${REAL_PYAPP}" >> "${SIGNED_REALPATHS_FILE}"
                fi
              done

              # 3) Sign framework version main binaries LAST.
              #    Their signatures seal Resources/ (including the signed Python.app).
              #    Python.framework/Python is now a symlink (fixed above) and needs
              #    no separate signing.
              for fwbin in \
                "${FRAMEWORK_DIR}/Versions/3.11/Python" \
                "${FRAMEWORK_DIR}/Versions/Current/Python"; do
                if [ -f "${fwbin}" ]; then
                  REAL_FWBIN="$(python3 -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "${fwbin}")"
                  if grep -Fqx -- "${REAL_FWBIN}" "${SIGNED_REALPATHS_FILE}"; then
                    continue
                  fi
                  echo "Signing framework version binary: ${fwbin}"
                  codesign --force --options runtime --timestamp --sign "${IDENTITY}" "${REAL_FWBIN}"
                  printf '%s\n' "${REAL_FWBIN}" >> "${SIGNED_REALPATHS_FILE}"
                fi
              done

              rm -f "${SIGNED_REALPATHS_FILE}"
            fi

            echo "Signing app bundle root: ${app}"
            codesign --force --options runtime --timestamp --sign "${IDENTITY}" "${app}"
            echo "Verifying app signature (deep): ${app}"
            codesign --verify --deep --strict --verbose=2 "${app}"
          done

          # Install create-dmg for polished DMG installer layout
          brew install create-dmg 2>/dev/null || true

          # Recreate DMG from the signed .app.
          # Tauri creates the DMG during build BEFORE our re-signing,
          # so the DMG contains the original Tauri-signed app without runtime
          # hardening or timestamps.  We must rebuild it.
          #
          # The old DMG may still be held open by diskimages-helper (macOS
          # auto-mounts DMGs for verification). Detach all volumes and retry
          # to avoid "Resource busy" failures.
          DMG_DIR="${BUNDLE_DIR}/dmg"
          if [ -d "${DMG_DIR}" ]; then
            for dmg_file in "${DMG_DIR}"/*.dmg; do
              [ -f "${dmg_file}" ] || continue
              if [ "${#APPS[@]}" -gt 0 ]; then
                app="${APPS[0]}"
                app_name="$(basename "${app}" .app)"
                echo "Recreating DMG from signed app: ${dmg_file}"

                # Detach any volumes mounted from the old DMG
                for vol in /Volumes/"${app_name}"*; do
                  [ -d "${vol}" ] && hdiutil detach "${vol}" -force 2>/dev/null || true
                done
                sleep 1

                rm -f "${dmg_file}"

                DMG_STAGE="$(mktemp -d)"
                cp -a "${app}" "${DMG_STAGE}/"

                # Use create-dmg for polished layout: App (left) → arrow → Applications (right)
                if command -v create-dmg &>/dev/null; then
                  # Generate background image with a directional arrow (ImageMagick is pre-installed)
                  DMG_BG="/tmp/dmg_bg_$$.png"
                  if command -v magick &>/dev/null; then
                    magick -size 660x400 xc:'#EDEDED' \
                      -fill '#A8A8AD' \
                      -draw "rectangle 290,195 340,205" \
                      -draw "polygon 335,178 368,200 335,222" \
                      "${DMG_BG}" 2>/dev/null || true
                  elif command -v convert &>/dev/null; then
                    convert -size 660x400 xc:'#EDEDED' \
                      -fill '#A8A8AD' \
                      -draw "rectangle 290,195 340,205" \
                      -draw "polygon 335,178 368,200 335,222" \
                      "${DMG_BG}" 2>/dev/null || true
                  fi

                  CREATE_DMG_ARGS=(
                    --volname "${app_name}"
                    --window-pos 200 120
                    --window-size 660 400
                    --icon-size 100
                    --icon "${app_name}.app" 180 200
                    --hide-extension "${app_name}.app"
                    --app-drop-link 480 200
                    --no-internet-enable
                  )
                  [ -f "${DMG_BG:-}" ] && CREATE_DMG_ARGS+=(--background "${DMG_BG}")

                  dmg_created=false
                  for attempt in 1 2 3; do
                    rm -f "${dmg_file}"
                    create-dmg "${CREATE_DMG_ARGS[@]}" \
                      "${dmg_file}" "${DMG_STAGE}/" || true
                    if [ -f "${dmg_file}" ]; then
                      echo "DMG created with custom layout: ${dmg_file}"
                      dmg_created=true
                      break
                    fi
                    echo "create-dmg attempt ${attempt} failed, retrying in 3s..."
                    sleep 3
                  done
                  rm -f "${DMG_BG:-}" 2>/dev/null || true

                  # Fallback to basic hdiutil if create-dmg failed
                  if [ "${dmg_created}" != "true" ]; then
                    echo "create-dmg failed; falling back to hdiutil"
                    ln -s /Applications "${DMG_STAGE}/Applications"
                    hdiutil create -volname "${app_name}" \
                      -srcfolder "${DMG_STAGE}" -ov -format UDZO "${dmg_file}"
                  fi
                else
                  # Fallback: create-dmg not available
                  ln -s /Applications "${DMG_STAGE}/Applications"
                  for attempt in 1 2 3; do
                    if hdiutil create \
                      -volname "${app_name}" \
                      -srcfolder "${DMG_STAGE}" \
                      -ov -format UDZO \
                      "${dmg_file}"; then
                      echo "DMG recreated: ${dmg_file}"
                      break
                    fi
                    echo "hdiutil create attempt ${attempt} failed, retrying in 3s..."
                    sleep 3
                  done
                fi
                rm -rf "${DMG_STAGE}"
              fi
            done
          fi

      - name: Notarize macOS artifacts (manual notarytool)
        if: runner.os == 'macOS'
        timeout-minutes: 90
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID not fully configured, skipping notarization."
            exit 0
          fi

          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            BUNDLE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release/bundle"
          else
            BUNDLE_DIR="${TARGET_BASE}/release/bundle"
          fi
          ARTIFACTS=()
          while IFS= read -r -d '' artifact; do
            ARTIFACTS+=("${artifact}")
          done < <(find "${BUNDLE_DIR}" -type f -name "*.dmg" -print0)
          if [ "${#ARTIFACTS[@]}" -eq 0 ]; then
            echo "No DMG artifacts found for notarization." >&2
            exit 1
          fi

          PROFILE_NAME="openakita-notary"
          xcrun notarytool store-credentials "${PROFILE_NAME}" \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}"

          for artifact in "${ARTIFACTS[@]}"; do
            echo "Submitting for notarization: ${artifact}"
            submit_json="$(xcrun notarytool submit "${artifact}" \
              --keychain-profile "${PROFILE_NAME}" \
              --output-format json)"
            submission_id="$(printf '%s' "${submit_json}" | python -c 'import json,sys; print(json.load(sys.stdin).get("id",""))')"
            if [ -z "${submission_id}" ]; then
              echo "Failed to parse notarization submission ID for ${artifact}" >&2
              echo "${submit_json}" >&2
              exit 1
            fi
            echo "Submission ID: ${submission_id}"

            MAX_WAIT_SECONDS=$((3 * 60 * 60))
            POLL_INTERVAL_SECONDS=30
            START_TS=$(date +%s)
            while true; do
              if ! info_json="$(xcrun notarytool info "${submission_id}" \
                --keychain-profile "${PROFILE_NAME}" \
                --output-format json)"; then
                echo "Failed to query submission ${submission_id}, retrying in ${POLL_INTERVAL_SECONDS}s..."
                sleep "${POLL_INTERVAL_SECONDS}"
                continue
              fi

              status="$(printf '%s' "${info_json}" | python -c 'import json,sys; print(json.load(sys.stdin).get("status","").strip().lower())')"
              NOW_TS=$(date +%s)
              ELAPSED_SECONDS=$((NOW_TS - START_TS))

              case "${status}" in
                accepted)
                  echo "Notarization accepted in ${ELAPSED_SECONDS}s for ${artifact}"
                  break
                  ;;
                invalid|rejected)
                  echo "Notarization failed with status '${status}' for ${artifact}" >&2
                  echo "Submission ID: ${submission_id}" >&2
                  echo "Fetching notarization log..." >&2
                  xcrun notarytool log "${submission_id}" \
                    --keychain-profile "${PROFILE_NAME}" || true
                  exit 1
                  ;;
                "in progress")
                  echo "Current status: In Progress (elapsed ${ELAPSED_SECONDS}s)"
                  ;;
                *)
                  echo "Current status: ${status:-unknown} (elapsed ${ELAPSED_SECONDS}s)"
                  ;;
              esac

              if [ "${ELAPSED_SECONDS}" -ge "${MAX_WAIT_SECONDS}" ]; then
                echo "Timed out waiting ${MAX_WAIT_SECONDS}s for submission ${submission_id}." >&2
                echo "Apple service may still be processing it. Check later with:" >&2
                echo "xcrun notarytool info ${submission_id} --keychain-profile ${PROFILE_NAME}" >&2
                exit 1
              fi

              sleep "${POLL_INTERVAL_SECONDS}"
            done

            echo "Stapling ticket: ${artifact}"
            xcrun stapler staple -v "${artifact}"
            xcrun stapler validate -v "${artifact}" || true
          done

      - name: List bundle outputs
        shell: bash
        run: |
          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            RELEASE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release"
            BUNDLE_DIR="${RELEASE_DIR}/bundle"
          else
            RELEASE_DIR="${TARGET_BASE}/release"
            BUNDLE_DIR="${RELEASE_DIR}/bundle"
          fi
          echo "== release dir =="
          ls -la "${RELEASE_DIR}" || true
          echo "== bundle dir =="
          ls -la "${BUNDLE_DIR}" || true
          echo "== bundle tree (depth 4) =="
          find "${BUNDLE_DIR}" -maxdepth 4 -type f -print || true

      - name: Collect installer bundles
        shell: bash
        run: |
          set -euo pipefail

          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            BUNDLE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release/bundle"
          else
            BUNDLE_DIR="${TARGET_BASE}/release/bundle"
          fi
          OUT_DIR="${BUNDLE_DIR}/_upload"
          rm -rf "${OUT_DIR}"
          mkdir -p "${OUT_DIR}"

          SUFFIX="${{ matrix.suffix }}"
          copy_norm() {
            local f="$1"
            local base
            base="$(basename "$f")"
            # 统一文件名：把空格换成点，避免 Release 里出现重复/难找的资产名
            local norm="${base// /.}"
            # 在扩展名前插入构建模式后缀（如 -core, -full）
            if [ -n "${SUFFIX}" ]; then
              local ext="${norm##*.}"
              local name="${norm%.*}"
              norm="${name}${SUFFIX}.${ext}"
            fi
            cp -f "$f" "${OUT_DIR}/${norm}"
          }

          want=()
          case "${RUNNER_OS}" in
            Windows) want=("exe") ;;
            macOS) want=("dmg") ;;
            Linux) want=("deb" "AppImage") ;;
            *) echo "Unsupported RUNNER_OS=${RUNNER_OS}" >&2; exit 2 ;;
          esac

          found=0
          for ext in "${want[@]}"; do
            while IFS= read -r -d '' f; do
              # Windows：只取 NSIS 安装器（bundle/nsis/*.exe），过滤掉卸载器等其他 exe
              if [ "${RUNNER_OS}" = "Windows" ]; then
                case "$f" in
                  */nsis/*.exe)
                    if [ "$(basename "$f")" = "uninstall.exe" ]; then
                      continue
                    fi
                    ;;
                  *)
                    continue
                    ;;
                esac
              fi

              copy_norm "$f"
              found=$((found+1))
            done < <(find "${BUNDLE_DIR}" -type f -name "*.${ext}" -print0)
          done

          # 同时收集 .sig 签名文件（如果存在）
          sig_count=0
          while IFS= read -r -d '' sigf; do
            cp -f "$sigf" "${OUT_DIR}/"
            sig_count=$((sig_count+1))
          done < <(find "${BUNDLE_DIR}" -type f -name "*.sig" -print0)
          if [ "${sig_count}" -gt 0 ]; then
            echo "Collected ${sig_count} signature file(s)."
          fi

          echo "Collected ${found} installer(s) into ${OUT_DIR}:"
          ls -la "${OUT_DIR}" || true

          if [ "${found}" -eq 0 ]; then
            echo "ERROR: no installer bundles found." >&2
            exit 1
          fi

      - name: Upload installers to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TARGET_BASE="apps/setup-center/src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            BUNDLE_DIR="${TARGET_BASE}/${{ matrix.rust_target }}/release/bundle"
          else
            BUNDLE_DIR="${TARGET_BASE}/release/bundle"
          fi
          OUT_DIR="${BUNDLE_DIR}/_upload"
          ls -la "${OUT_DIR}"
          gh release upload "${RELEASE_TAG}" "${OUT_DIR}"/* --clobber

      - name: Upload signature files as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signatures-${{ matrix.platform }}-${{ matrix.build_mode }}
          path: apps/setup-center/src-tauri/target/**/bundle/_upload/*.sig
          if-no-files-found: ignore
          retention-days: 5

  # ── Job 3: 全部成功后发布 Release + 生成 manifest ──
  publish_release:
    needs: [create_release, python_release, desktop_release]
    if: ${{ !cancelled() && needs.create_release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_WEBSITE_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
      HAS_R2_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
      HAS_OSS_KEY: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Publish release (remove draft flag)
        env:
          GH_TOKEN: ${{ github.token }}
          IS_STABLE: ${{ needs.create_release.outputs.is_stable }}
        run: |
          LATEST_FLAG=""
          if [ "$IS_STABLE" = "true" ]; then
            LATEST_FLAG="--latest"
          else
            LATEST_FLAG="--latest=false"
          fi
          gh release edit "${{ env.RELEASE_TAG }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            ${LATEST_FLAG}

      - name: Generate release manifest
        env:
          GH_TOKEN: ${{ github.token }}
          IS_STABLE: ${{ needs.create_release.outputs.is_stable }}
        run: |
          CHANNEL="${{ needs.create_release.outputs.channel }}"
          echo "Release channel: ${CHANNEL} (is_stable=${IS_STABLE})"

          # 始终生成当前版本的 manifest
          # 优先使用阿里云 OSS CDN（国内加速），R2 作为国际备用
          CDN_ARGS=""
          if [ -n "${HAS_OSS_KEY}" ]; then
            CDN_ARGS="--cdn-base-url https://${{ secrets.ALIYUN_OSS_CDN_DOMAIN }}"
            if [ -n "${HAS_R2_KEY}" ]; then
              CDN_ARGS="${CDN_ARGS} --cdn-fallback-url https://dl.openakita.ai"
            fi
          elif [ -n "${HAS_R2_KEY}" ]; then
            CDN_ARGS="--cdn-base-url https://dl.openakita.ai"
          fi
          python scripts/generate_latest_json.py \
            --tag "${{ env.RELEASE_TAG }}" \
            --output latest-this.json \
            --repo "${{ github.repository }}" \
            ${CDN_ARGS}

          NEW_VER=$(python -c "import json; print(json.load(open('latest-this.json'))['version'])")
          echo "New version: ${NEW_VER}"

          if [ "$IS_STABLE" = "true" ]; then
            # ── 稳定版：版本号更大则覆盖，相同则也覆盖（支持重新发布），更小则跳过 ──
            SHOULD_UPDATE="true"
            MANIFEST_CHECK_URL="https://openakita.ai/api/release.json"
            if [ -n "${HAS_OSS_KEY}" ]; then
              MANIFEST_CHECK_URL="https://${{ secrets.ALIYUN_OSS_CDN_DOMAIN }}/api/release.json"
            fi
            if curl -sf "${MANIFEST_CHECK_URL}" -o existing-release.json 2>/dev/null; then
              OLD_VER=$(python -c "import json; print(json.load(open('existing-release.json'))['version'])" 2>/dev/null || echo "0.0.0")
              echo "Existing stable version: ${OLD_VER}"
              IS_OLDER=$(python -c "old=list(map(int,'${OLD_VER}'.split('.')));new=list(map(int,'${NEW_VER}'.split('.')));print('true' if new<old else 'false')")
              if [ "$IS_OLDER" = "true" ]; then
                echo "⏭️ Skipping release.json update: ${NEW_VER} < ${OLD_VER} (older version)"
                SHOULD_UPDATE="false"
              elif [ "${NEW_VER}" = "${OLD_VER}" ]; then
                echo "🔄 Same version ${NEW_VER}, will overwrite (re-release)"
              fi
            else
              echo "No existing release.json found, will create"
            fi

            if [ "$SHOULD_UPDATE" = "true" ]; then
              cp latest-this.json release.json
              echo "📦 Stable release → release.json (${NEW_VER})"
            fi
            cp latest-this.json "release-${NEW_VER}.json"
            echo "SHOULD_UPDATE_STABLE=${SHOULD_UPDATE}" >> "$GITHUB_ENV"
          else
            cp latest-this.json pre-release.json
            echo "🔧 Dev release → pre-release.json"
            echo "SHOULD_UPDATE_STABLE=false" >> "$GITHUB_ENV"
          fi

          echo "=== manifest ==="
          cat latest-this.json

      - name: Upload manifest as release asset
        env:
          GH_TOKEN: ${{ github.token }}
          IS_STABLE: ${{ needs.create_release.outputs.is_stable }}
        run: |
          # 始终把当前版本的 manifest 上传到对应 Release
          gh release upload "${{ env.RELEASE_TAG }}" latest-this.json --clobber

      # ── 下载 Release 资产到临时目录（供后续上传步骤使用） ──
      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ env.RELEASE_TAG }}"
          mkdir -p /tmp/release-assets
          gh release download "${TAG}" \
            --repo "${{ github.repository }}" \
            --dir /tmp/release-assets \
            --pattern "*.exe" --pattern "*.dmg" --pattern "*.deb" \
            --pattern "*.AppImage" --pattern "*.appimage" \
            --pattern "*.app.tar.gz" --pattern "*.sig" \
            --clobber || true
          echo "Downloaded $(ls /tmp/release-assets | wc -l) asset(s)"

      # ── 上传安装包 + manifest 到阿里云 OSS（国内加速） ──
      - name: Upload to Aliyun OSS
        if: ${{ env.HAS_OSS_KEY != '' }}
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          IS_STABLE: ${{ needs.create_release.outputs.is_stable }}
        run: |
          set -euo pipefail

          # 安装 ossutil
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | bash
          ossutil config \
            -e "${OSS_ENDPOINT}" \
            -i "${OSS_ACCESS_KEY_ID}" \
            -k "${OSS_ACCESS_KEY_SECRET}"

          TAG="${{ env.RELEASE_TAG }}"

          # 1) 上传安装包到 OSS（按版本号组织目录）
          ASSET_COUNT=0
          for file in /tmp/release-assets/*; do
            [ -f "$file" ] || continue
            FILENAME="$(basename "$file")"
            echo "  Uploading: ${FILENAME}"
            ossutil cp "$file" "oss://${OSS_BUCKET}/${TAG}/${FILENAME}" -f
            ASSET_COUNT=$((ASSET_COUNT + 1))
          done
          echo "Uploaded ${ASSET_COUNT} asset(s) to OSS (${OSS_BUCKET}/${TAG}/)"

          # 2) 上传 manifest 到 OSS api/ 目录（替代 push 到 openakita-web）
          #    设置短 Cache-Control，确保客户端能快速获取最新版本信息
          if [ "$IS_STABLE" = "true" ] && [ "$SHOULD_UPDATE_STABLE" = "true" ]; then
            ossutil cp "$GITHUB_WORKSPACE/release.json" \
              "oss://${OSS_BUCKET}/api/release.json" -f \
              --meta "Cache-Control:public, max-age=60"
            echo "✅ Uploaded release.json to OSS"
          fi

          if [ "$IS_STABLE" != "true" ]; then
            ossutil cp "$GITHUB_WORKSPACE/pre-release.json" \
              "oss://${OSS_BUCKET}/api/pre-release.json" -f \
              --meta "Cache-Control:public, max-age=60"
            echo "✅ Uploaded pre-release.json to OSS"
          fi

      # ── 上传安装包到 Cloudflare R2（国际备用） ──
      - name: Upload release assets to Cloudflare R2
        if: ${{ env.HAS_R2_KEY != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          R2_BUCKET: openakita-releases
        run: |
          set -euo pipefail
          pip install -q awscli

          TAG="${{ env.RELEASE_TAG }}"
          echo "Uploading release assets to R2 for ${TAG}..."

          ASSET_COUNT=0
          for file in /tmp/release-assets/*; do
            [ -f "$file" ] || continue
            FILENAME="$(basename "$file")"
            echo "  Uploading: ${FILENAME}"
            aws s3 cp "$file" "s3://${R2_BUCKET}/${TAG}/${FILENAME}" \
              --endpoint-url "${R2_ENDPOINT}" \
              --no-progress
            ASSET_COUNT=$((ASSET_COUNT + 1))
          done

          echo "Uploaded ${ASSET_COUNT} asset(s) to R2 (${R2_BUCKET}/${TAG}/)"

      # ── 推送到官网仓库（回退方案，仅在未配置 OSS 时使用） ──
      - name: Push to website repo (fallback)
        if: ${{ env.HAS_OSS_KEY == '' && env.HAS_WEBSITE_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          IS_STABLE: ${{ needs.create_release.outputs.is_stable }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/openakita/openakita-web.git" /tmp/openakita-web
          mkdir -p /tmp/openakita-web/api
          cd /tmp/openakita-web
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED="false"

          if [ "$IS_STABLE" = "true" ] && [ "$SHOULD_UPDATE_STABLE" = "true" ]; then
            cp "$GITHUB_WORKSPACE/release.json" api/release.json
            git add api/release.json
            CHANGED="true"
          fi

          if [ "$IS_STABLE" != "true" ]; then
            cp "$GITHUB_WORKSPACE/pre-release.json" api/pre-release.json
            git add api/pre-release.json
            CHANGED="true"
          fi

          if [ "$CHANGED" = "true" ] && ! git diff --cached --quiet; then
            git commit -m "chore: update manifest for ${{ env.RELEASE_TAG }} (${{ needs.create_release.outputs.channel }})"
            git push
            echo "Pushed to openakita-web"
          else
            echo "No changes to push"
          fi
